name: OpenWrt Cloud Builder (360T7)

on:
  repository_dispatch:
    types: [mediatek_filogic]
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout Workdir
      uses: actions/checkout@v4

    - name: Load Settings
      run: |
        source "devices/common/settings.ini"
        [ -f "devices/mediatek_filogic/settings.ini" ] && source "devices/mediatek_filogic/settings.ini"
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        echo "DIY_SH=$DIY_SH" >> $GITHUB_ENV

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Install Dependencies
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget \
          llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils ccache rename \
          libelf-dev device-tree-compiler libgmp3-dev libmpc-dev libfuse-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt Source
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Config & Patches
      run: |
        # 1. 注入基础配置
        cp -f devices/common/$CONFIG_FILE openwrt/.config
        # 2. 如果有设备特定配置，则追加
        [ -f "devices/mediatek_filogic/$CONFIG_FILE" ] && cat devices/mediatek_filogic/$CONFIG_FILE >> openwrt/.config
        # 3. 应用补丁 (common + specific)
        cd openwrt
        [ -d "../devices/common/patches" ] && find ../devices/common/patches -name "*.patch" | sort | xargs -n 1 patch -p1 -i
        [ -d "../devices/mediatek_filogic/patches" ] && find ../devices/mediatek_filogic/patches -name "*.patch" | sort | xargs -n 1 patch -p1 -i
        # 4. 执行自定义脚本
        [ -f "../devices/common/$DIY_SH" ] && chmod +x ../devices/common/$DIY_SH && /bin/bash ../devices/common/$DIY_SH

    - name: Download Package Sources
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build Firmware
      id: build
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make V=s -j1
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize Firmware Files
      if: steps.build.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*/
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@v4
      if: steps.build.outputs.status == 'success'
      with:
        name: OpenWrt_360T7_Firmware
        path: ${{ env.FIRMWARE_PATH }}/*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: steps.build.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: Build_${{ github.run_id }}
        name: OpenWrt Firmware for 360T7 (Build ${{ github.run_id }})
        files: ${{ env.FIRMWARE_PATH }}/*
